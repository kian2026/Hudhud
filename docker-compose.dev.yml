name: hudhud-dev

services:
  postgres:
    image: postgres:15
    container_name: hudhud-postgres-dev
    restart: always
    environment:
      POSTGRES_USER: hudhud
      POSTGRES_PASSWORD: hudhud
      POSTGRES_DB: hudhud
    ports:
      - "5433:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    networks:
      - hudhud_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hudhud"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: hudhud-redis-dev
    ports:
      - "6379:6379"
    networks:
      - hudhud_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: hudhud-neo4j-dev
    ports:
      - "7474:7474" # Web UI
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - neo4j_data_dev:/data
      - neo4j_logs_dev:/logs
      - neo4j_import_dev:/var/lib/neo4j/import
      - neo4j_plugins_dev:/plugins
    restart: unless-stopped
    networks:
      - hudhud_network
    healthcheck:
      test: cypher-shell -u ${NEO4J_USERNAME} -p ${NEO4J_PASSWORD} "RETURN 1"
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: hudhud-api/Dockerfile
      target: dev
    container_name: hudhud-api-dev
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./hudhud-api:/app/hudhud-api
      - /app/hudhud-api/.venv
      - ./hudhud-core:/app/hudhud-core
      - ./hudhud-types:/app/hudhud-types
      - ./hudhud-enrichers:/app/hudhud-enrichers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DATABASE_URL=postgresql://hudhud:hudhud@postgres:5432/hudhud
      - NEO4J_URI_BOLT=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - MASTER_VAULT_KEY_V1=${MASTER_VAULT_KEY_V1}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hudhud_network

  celery:
    build:
      context: .
      dockerfile: hudhud-api/Dockerfile
      target: dev
    container_name: hudhud-celery-dev
    restart: unless-stopped
    command: celery -A hudhud_core.core.celery worker --loglevel=info --pool=threads --concurrency=10
    volumes:
      - ./hudhud-api:/app/hudhud-api
      - /app/hudhud-api/.venv
      - ./hudhud-core:/app/hudhud-core
      - ./hudhud-types:/app/hudhud-types
      - ./hudhud-enrichers:/app/hudhud-enrichers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DATABASE_URL=postgresql://hudhud:hudhud@postgres:5432/hudhud
      - NEO4J_URI_BOLT=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - MASTER_VAULT_KEY_V1=${MASTER_VAULT_KEY_V1}
      - REDIS_URL=redis://redis:6379/0
      - SKIP_MIGRATIONS=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - hudhud_network

  app:
    build:
      context: ./hudhud-app
      dockerfile: Dockerfile.dev
    container_name: hudhud-app-dev
    ports:
      - "5173:5173"
    volumes:
      - ./hudhud-app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hudhud_network
    stdin_open: true
    tty: true

networks:
  hudhud_network:
    name: hudhud_network_dev
    driver: bridge

volumes:
  pg_data_dev:
  neo4j_data_dev:
  neo4j_logs_dev:
  neo4j_import_dev:
  neo4j_plugins_dev:
